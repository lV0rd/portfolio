<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Tin — Roblox developer. Lua scripting, UI/UX, and gameplay systems." />
  <title>Tin — Roblox Developer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Particle Background -->
  <div class="particles" aria-hidden="true">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- NAV -->
  <nav>
    <div class="nav-inner" role="navigation" aria-label="Main navigation">
      <a class="brand" href="#home">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" fill="url(#gradient)" stroke="var(--accent)" stroke-width="2"/>
          <path d="M8 12h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:var(--accent);stop-opacity:1" />
              <stop offset="100%" style="stop-color:var(--accent-2);stop-opacity:1" />
            </linearGradient>
          </defs>
        </svg>
        <h1 id="nav-name"></h1>
      </a>

      <div class="nav-links" id="navLinks">
        <a href="#home" class="nav-link active">Home</a>
        <a href="#about" class="nav-link">About</a>
        <a href="#projects" class="nav-link">Projects</a>
        <a href="#showcase" class="nav-link">Technical Showcase</a>
        <a href="#tos" class="nav-link">Terms</a>
        <a href="#reviews" class="nav-link">Reviews</a>
        <a href="#contact" class="nav-link">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <!-- HERO -->
    <header id="home" class="hero" tabindex="-1">
      <div class="eyebrow" id="hero-eyebrow"></div>
      <h2 id="hero-name"></h2>
      <p class="lead" id="hero-description"></p>
      <div class="cta-row">
        <a class="btn" href="#projects">View Highlighted Work</a>
        <a class="btn secondary" href="#contact">Get a Quote</a>
      </div>
    </header>

    <!-- ABOUT -->
    <section id="about" aria-labelledby="about-title">
      <div class="section-header">
        <h3 id="about-title">About Me</h3>
        <p class="lead-mini" id="about-skills"></p>
      </div>
      <div id="about-content"></div>
    </section>

    <!-- PROJECTS -->
    <section id="projects" aria-labelledby="projects-title">
      <div class="section-header">
        <h3 id="projects-title">Projects</h3>
        <p class="lead-mini" id="projects-description"></p>
      </div>
      <div class="projects grid" role="list" id="projects-grid"></div>
    </section>

    <!-- TECHNICAL SHOWCASE -->
    <section id="showcase" aria-labelledby="showcase-title">
      <div class="section-header">
        <h3 id="showcase-title">Technical Showcase</h3>
        <p class="lead-mini" id="showcase-description"></p>
      </div>
      <div class="showcase-wrapper" role="list" id="showcase-wrapper"></div>
    </section>

    <!-- TERMS -->
    <section id="tos" aria-labelledby="tos-title">
      <div class="section-header">
        <h3 id="tos-title">Terms of Service</h3>
        <p class="lead-mini" id="tos-description"></p>
      </div>
      <div id="tos-content"></div>
    </section>

    <!-- REVIEWS -->
    <section id="reviews" aria-labelledby="reviews-title">
      <div class="section-header">
        <h3 id="reviews-title">Reviews</h3>
        <p class="lead-mini" id="reviews-description"></p>
      </div>
      <div id="reviews-content"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact" aria-labelledby="contact-title">
      <div class="section-header">
        <h3 id="contact-title">Contact</h3>
        <p class="lead-mini" id="contact-description"></p>
      </div>
      <div class="contact-grid" id="contact-grid"></div>
    </section>

    <footer>
      <div>&copy; <span id="current-year"></span> <span id="footer-name"></span> — Roblox Developer</div>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
